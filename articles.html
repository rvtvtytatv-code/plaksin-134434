<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Статьи — Вячеслав Плаксин</title>
  <meta name="description" content="Статьи, печатные издания и публикации Вячеслава Плаксина." />
  <style>
    :root{
      --bg:#f7f4f1;
      --card:#ffffff;
      --ink:#07182d;
      --muted:#66717f;
      --blue:#0878dc;
      --blue2:#005eb8;
      --line:#ddd6cf;
      --shadow:0 24px 60px rgba(7,24,45,.08);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:"Segoe UI", Arial, Helvetica, sans-serif;
      font-weight:400;
      overflow-x:hidden;
    }
    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}
    button{font:inherit}

    .wrap{width:min(100% - 48px,1210px);margin:0 auto}

    .top{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(247,244,241,.96);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line);
    }
    .nav{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
      min-height:96px;
      padding:14px 0;
    }
    .brand{
      display:block;
      font-size:26px;
      font-weight:600;
      line-height:1;
      letter-spacing:-.035em;
      white-space:nowrap;
    }
    .brand span{
      display:block;
      margin-bottom:7px;
      color:var(--blue);
      font-size:14px;
      font-weight:600;
      line-height:1.1;
      text-transform:uppercase;
      letter-spacing:.12em;
    }
    .menu{
      display:flex;
      align-items:center;
      gap:34px;
      font-size:16px;
      font-weight:500;
      color:#3f4c5e;
    }
    .menu a:hover{color:var(--blue)}
    .burger{
      display:none;
      align-items:center;
      justify-content:center;
      width:42px;
      height:42px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      color:var(--ink);
      font-size:20px;
      cursor:pointer;
    }

    .page-hero{
      padding:56px 0 36px;
      border-bottom:1px solid var(--line);
    }
    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-bottom:24px;
      color:var(--blue);
      font-size:18px;
      font-weight:500;
    }
    .eyebrow{
      margin-bottom:10px;
      color:var(--blue);
      font-size:24px;
      font-weight:600;
      line-height:1;
      letter-spacing:-.03em;
    }
    .page-title{
      max-width:760px;
      margin:0;
      color:var(--ink);
      font-size:clamp(28px,3.2vw,42px);
      font-weight:500;
      line-height:1.08;
      letter-spacing:-.04em;
    }

    section{padding:46px 0}
    .articles-list{
      display:grid;
      grid-template-columns:1fr;
      gap:18px;
    }
    .article-card{
      display:grid;
      grid-template-columns:260px minmax(0,1fr);
      gap:20px;
      padding:18px;
      border-radius:30px;
      cursor:pointer;
      transition:.2s ease;
      background:white;
      border:1px solid var(--line);
      box-shadow:0 10px 30px rgba(7,24,45,.04);
    }
    .article-card:hover{
      transform:translateY(-4px);
      box-shadow:var(--shadow);
    }
    .thumb{
      width:100%;
      height:190px;
      object-fit:cover;
      border-radius:22px;
      background:#f1ece7;
    }
    .article-body{
      min-width:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      color:var(--muted);
      font-size:14px;
      font-weight:600;
      margin-bottom:10px;
    }
    .topic{
      color:var(--blue);
      font-weight:600;
    }
    .article-title{
      margin:0 0 10px;
      font-size:30px;
      line-height:.98;
      letter-spacing:-.045em;
      font-weight:500;
      overflow-wrap:anywhere;
    }
    .excerpt{
      margin:0;
      color:var(--muted);
      line-height:1.55;
      font-size:16px;
    }
    .empty{
      padding:24px;
      border:1px dashed var(--line);
      border-radius:24px;
      color:var(--muted);
      background:#fff;
    }

    .modal{
      position:fixed;
      inset:0;
      z-index:100;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:rgba(7,24,45,.62);
    }
    .modal.open{display:flex}
    .modal-card{
      width:min(980px,100%);
      max-height:92vh;
      overflow:auto;
      background:#fff;
      border-radius:30px;
      padding:26px;
      box-shadow:var(--shadow);
    }
    .modal-close{
      border:1px solid var(--line);
      background:#fff;
      color:var(--blue);
      width:44px;
      height:44px;
      border-radius:999px;
      cursor:pointer;
      font-size:30px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-left:auto;
    }
    .modal-cover{
      width:100%;
      max-height:420px;
      object-fit:cover;
      border-radius:24px;
      margin:18px 0;
      background:#f1ece7;
    }
    .modal-title{
      margin:12px 0 10px;
      font-size:clamp(30px,3.2vw,42px);
      line-height:1.04;
      letter-spacing:-.045em;
      font-weight:500;
      overflow-wrap:anywhere;
    }
    .modal-body{
      font-size:18px;
      line-height:1.7;
      color:#304052;
      white-space:pre-line;
    }
    .gallery{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
      margin-top:18px;
    }
    .gallery img{
      width:100%;
      height:220px;
      object-fit:cover;
      border-radius:18px;
      background:#f1ece7;
    }
    .footer{
      padding:32px 0;
      border-top:1px solid var(--line);
      color:var(--muted);
      font-size:16px;
    }

    @media(max-width:920px){
      .article-card{grid-template-columns:1fr}
      .thumb{height:220px}
      .menu{gap:22px;font-size:15px}
    }

    @media(max-width:720px){
      .wrap{width:calc(100% - 24px)}
      .nav{min-height:74px;padding:12px 0}
      .brand{
        max-width:250px;
        font-size:18px;
        line-height:.96;
      }
      .brand span{margin-bottom:7px;font-size:10px}
      .burger{display:flex;flex-shrink:0}
      .menu{
        display:none;
        position:absolute;
        top:72px;
        left:0;
        right:0;
        z-index:80;
        flex-direction:column;
        align-items:flex-start;
        gap:14px;
        padding:18px;
        background:#fff;
        border:1px solid var(--line);
        border-radius:22px;
        box-shadow:0 20px 60px rgba(7,24,45,.14);
      }
      .menu.open{display:flex}
      .menu a{width:100%}
      .page-hero{padding:42px 0 26px}
      .back-link{margin-bottom:18px;font-size:16px}
      .eyebrow{font-size:18px}
      .page-title{font-size:30px;line-height:1.12}
      section{padding:34px 0}
      .article-card{padding:14px;border-radius:24px;gap:14px}
      .thumb{height:200px;border-radius:18px}
      .article-title{font-size:24px}
      .excerpt{font-size:15px}
      .meta{font-size:13px}
      .modal{padding:10px}
      .modal-card{padding:18px;border-radius:24px;max-height:86vh}
      .modal-cover{border-radius:18px;max-height:260px}
      .modal-title{font-size:30px}
      .modal-body{font-size:16px;line-height:1.6}
      .gallery{grid-template-columns:1fr}
      .gallery img{height:200px}
    }
  
    /* ===== FINAL MOBILE FIX: full site responsive cleanup ===== */
    html,
    body{
      max-width:100% !important;
      overflow-x:hidden !important;
    }

    img,
    video,
    canvas,
    svg{
      max-width:100%;
    }

    @media(max-width:720px){
      .wrap{
        width:calc(100% - 24px) !important;
      }

      .nav{
        min-height:82px !important;
        height:auto !important;
        padding:10px 0 !important;
      }

      .brand{
        max-width:245px !important;
        font-size:20px !important;
        line-height:1.05 !important;
        letter-spacing:-.035em !important;
      }

      .brand span{
        font-size:11px !important;
        line-height:1.15 !important;
        margin-bottom:6px !important;
        letter-spacing:.12em !important;
      }

      .burger{
        display:flex !important;
        flex-shrink:0 !important;
        width:48px !important;
        height:48px !important;
        border-radius:17px !important;
        font-size:24px !important;
      }

      .menu{
        display:none !important;
        position:absolute !important;
        left:0 !important;
        right:0 !important;
        top:74px !important;
        z-index:120 !important;
        flex-direction:column !important;
        align-items:stretch !important;
        gap:0 !important;
        padding:10px !important;
        background:#fff !important;
        border:1px solid var(--line, #ddd6cf) !important;
        border-radius:22px !important;
        box-shadow:0 20px 60px rgba(7,24,45,.16) !important;
      }

      .menu.open{
        display:flex !important;
      }

      .menu a{
        width:100% !important;
        padding:14px 12px !important;
        border-radius:14px !important;
        font-size:16px !important;
      }

      .page-hero{
        padding:36px 0 24px !important;
      }

      .back-link{
        font-size:16px !important;
        margin-bottom:16px !important;
      }

      .eyebrow{
        font-size:20px !important;
        margin-bottom:8px !important;
      }

      .page-title{
        font-size:clamp(30px, 9vw, 42px) !important;
        line-height:1.08 !important;
        letter-spacing:-.045em !important;
        max-width:100% !important;
        overflow-wrap:anywhere !important;
      }

      .page-subtitle{
        font-size:16px !important;
        line-height:1.45 !important;
        max-width:100% !important;
      }

      section{
        padding:34px 0 !important;
      }

      .news-card,
      .article-card,
      .consult,
      .panel,
      .card,
      .item{
        border-radius:22px !important;
      }

      .news-card,
      .article-card{
        display:grid !important;
        grid-template-columns:1fr !important;
        gap:14px !important;
        padding:14px !important;
      }

      .thumb,
      .article-cover,
      .modal-cover{
        width:100% !important;
        height:auto !important;
        max-height:260px !important;
        object-fit:cover !important;
        border-radius:18px !important;
      }

      .news-title,
      .article-title,
      .modal-title{
        font-size:26px !important;
        line-height:1.08 !important;
        letter-spacing:-.04em !important;
        overflow-wrap:anywhere !important;
      }

      .excerpt,
      .article-body,
      .modal-body{
        font-size:16px !important;
        line-height:1.55 !important;
      }

      .consult-grid{
        display:grid !important;
        grid-template-columns:1fr !important;
        gap:12px !important;
      }

      .consult{
        min-height:auto !important;
        padding:20px 18px !important;
        text-align:center !important;
      }

      .consult h3{
        min-height:auto !important;
      }

      .consult-form-box{
        padding:20px !important;
        border-radius:24px !important;
      }

      .consult-form{
        grid-template-columns:1fr !important;
      }

      .consult-form .full{
        grid-column:1 !important;
      }

      .submit-row{
        flex-direction:column !important;
        align-items:stretch !important;
      }

      .btn{
        width:100% !important;
      }

      .modal{
        padding:10px !important;
      }

      .modal-card{
        width:100% !important;
        max-height:88vh !important;
        padding:18px !important;
        border-radius:24px !important;
      }

      .gallery{
        grid-template-columns:1fr !important;
      }

      .gallery img{
        height:auto !important;
        max-height:260px !important;
        object-fit:cover !important;
      }

      .footer{
        padding:24px 0 !important;
        font-size:14px !important;
      }
    }

    @media(max-width:420px){
      .wrap{
        width:calc(100% - 20px) !important;
      }

      .brand{
        font-size:19px !important;
        max-width:220px !important;
      }

      .brand span{
        font-size:10px !important;
      }

      .page-title{
        font-size:32px !important;
      }
    }

  </style>
</head>
<body>
  <header class="top">
    <div class="wrap nav">
      <a class="brand" href="./index.html"><span>Эксперт по безопасности</span>Вячеслав Плаксин</a>
      <nav class="menu" id="menu">
        <a href="./index.html">Главная</a>
        <a href="./news.html">Новости</a>
        <a href="./articles.html">Статьи</a>
        <a href="./consultation.html">Консультации</a>
        <a href="./about.html">Обо мне</a>
        <a href="./index.html#socials">Соцсети</a>
      </nav>
      <button class="burger" id="burger" aria-label="Открыть меню">☰</button>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="wrap">
        <a class="back-link" href="./index.html">← На главную</a>
        <div class="eyebrow">Статьи</div>
        <h1 class="page-title">Печатные издания и материалы</h1>
      </div>
    </section>

    <section>
      <div class="wrap">
        <div id="articlesList" class="articles-list">
          <div class="empty">Загрузка статей...</div>
        </div>
      </div>
    </section>
  </main>

  <div class="modal" id="articleModal">
    <div class="modal-card">
      <button class="modal-close" id="modalClose" aria-label="Закрыть">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="wrap">© <span id="year"></span> Вячеслав Плаксин. Новости, статьи, интервью и консультации.</div>
  </footer>

  <script>
    const API_BASE = "https://mao-unhesitative-greedily.ngrok-free.dev";
    
    const ARTICLE_MARKER = "__ARTICLE__";

    function isArticleItem(n){
      const topic = String(n.topic || "");
      return (
        n.type === "article" ||
        n.kind === "article" ||
        n.section === "articles" ||
        topic.startsWith(ARTICLE_MARKER)
      );
    }

    function cleanArticleTopic(topic){
      return String(topic || "").replace(/^__ARTICLE__\s*/i, "").trim();
    }

    const API_HEADERS = { "ngrok-skip-browser-warning":"true" };

    const burger = document.getElementById("burger");
    const menu = document.getElementById("menu");
    burger?.addEventListener("click", () => menu.classList.toggle("open"));

    document.getElementById("year").textContent = new Date().getFullYear();

    const articlesList = document.getElementById("articlesList");
    const modal = document.getElementById("articleModal");
    const modalContent = document.getElementById("modalContent");
    const modalClose = document.getElementById("modalClose");

    function fmtDate(value){
      if(!value) return "";
      const d = new Date(value);
      return isNaN(d) ? value : d.toLocaleDateString("ru-RU");
    }

    function image(src){
      if(!src) return "";
      const value = String(src);
      if(value.startsWith("http")) return value;
      if(value.startsWith("/uploads/")) return API_BASE + value;
      if(value.startsWith("uploads/")) return API_BASE + "/" + value;
      if(value.startsWith("/")) return API_BASE + value;
      return value;
    }

    function escapeHtml(str = ""){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    async function loadImageInto(img){
      const url = img.dataset.src;
      if(!url) return;

      if(!url.includes("/uploads/")){
        img.src = url;
        return;
      }

      try{
        const response = await fetch(url, {
          headers: API_HEADERS,
          cache: "no-store"
        });

        if(!response.ok) throw new Error("Не удалось загрузить изображение");

        const blob = await response.blob();
        img.src = URL.createObjectURL(blob);
      }catch(err){
        console.log("Ошибка фото:", err);
        img.style.display = "none";
      }
    }

    function loadImages(root = document){
      root.querySelectorAll("img[data-src]").forEach(loadImageInto);
    }

    async function apiList(){
      const res = await fetch(API_BASE + "/api/news", {
        headers: API_HEADERS,
        cache: "no-store"
      });

      if(!res.ok) throw new Error("Не удалось загрузить статьи");

      const data = await res.json();

      return Array.isArray(data)
        ? data.filter(n => isArticleItem(n))
        : [];
    }

    async function apiOne(key){
      const res = await fetch(API_BASE + "/api/news/" + encodeURIComponent(key), {
        headers: API_HEADERS,
        cache: "no-store"
      });

      if(!res.ok) throw new Error("Не удалось открыть статью");

      return await res.json();
    }

    function renderList(items){
      if(!items.length){
        articlesList.innerHTML = '<div class="empty">Пока нет опубликованных статей.</div>';
        return;
      }

      articlesList.innerHTML = items.map(n => {
        const key = n.slug || n.id || "";
        const cover = image(n.cover);

        return `
          <article class="article-card" data-key="${escapeHtml(key)}">
            ${cover ? `<img class="thumb" data-src="${escapeHtml(cover)}" alt="">` : `<div class="thumb"></div>`}
            <div class="article-body">
              <div class="meta">
                <span>${fmtDate(n.date)}</span>
                ${n.topic ? `<span class="topic">${escapeHtml(cleanArticleTopic(n.topic))}</span>` : ""}
              </div>
              <h2 class="article-title">${escapeHtml(n.title || "Без названия")}</h2>
              <p class="excerpt">${escapeHtml(n.excerpt || "")}</p>
            </div>
          </article>
        `;
      }).join("");

      articlesList.querySelectorAll(".article-card").forEach(card => {
        card.addEventListener("click", () => openArticle(card.dataset.key));
      });

      loadImages(articlesList);
    }

    async function loadArticles(){
      try{
        const data = await apiList();
        const items = Array.isArray(data) ? data.filter(n => n.status !== "draft") : [];
        renderList(items);
      }catch(err){
        articlesList.innerHTML = `<div class="empty">Ошибка загрузки: ${escapeHtml(err.message)}</div>`;
      }
    }

    async function openArticle(key){
      try{
        const n = await apiOne(key);
        const cover = image(n.cover);

        modalContent.innerHTML = `
          <div class="meta">
            <span>${fmtDate(n.date)}</span>
            ${n.topic ? `<span class="topic">${escapeHtml(cleanArticleTopic(n.topic))}</span>` : ""}
          </div>
          <h2 class="modal-title">${escapeHtml(n.title || "Без названия")}</h2>
          ${cover ? `<img class="modal-cover" data-src="${escapeHtml(cover)}" alt="">` : ""}
          <div class="modal-body">${escapeHtml(n.body || n.excerpt || "")}</div>
          ${Array.isArray(n.gallery) && n.gallery.length ? `<div class="gallery">${n.gallery.map(src => `<img data-src="${escapeHtml(image(src))}" alt="">`).join("")}</div>` : ""}
        `;

        modal.classList.add("open");
        document.body.style.overflow = "hidden";
        loadImages(modalContent);
      }catch(err){
        alert(err.message);
      }
    }

    function closeModal(){
      modal.classList.remove("open");
      document.body.style.overflow = "";
    }

    modalClose.addEventListener("click", closeModal);
    modal.addEventListener("click", e => {
      if(e.target === modal) closeModal();
    });
    document.addEventListener("keydown", e => {
      if(e.key === "Escape") closeModal();
    });

    loadArticles();
  </script>
</body>
</html>
